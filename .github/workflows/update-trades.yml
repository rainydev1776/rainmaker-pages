name: Update trades.json

on:
  schedule:
    # Every 4 hours (covers all timezones, games finish ~midnight ET → 4am ET next refresh)
    - cron: '0 */4 * * *'
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Pull latest trades from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SPORT: MLB
        run: node scripts/pull-trades.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trades.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "auto: update trades.json $(date -u +%Y-%m-%d)"
          git push
