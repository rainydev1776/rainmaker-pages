<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainmaker — Fee Revenue Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c12;
    --bg2: #0d1420;
    --bg3: #131d2e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8edf5;
    --muted: #6b7a94;
    --dim: #3a4560;
    --blue: #2d7ff9;
    --blue-dim: rgba(45,127,249,0.1);
    --green: #1ec9a0;
    --green-dim: rgba(30,201,160,0.08);
    --body: 'DM Sans', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 24px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 760px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    overflow: hidden;
  }

  .card-header {
    padding: 28px 32px 24px;
    border-bottom: 1px solid var(--border);
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 4px;
  }

  .card-heading {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }

  .card-body { padding: 28px 32px; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .metric {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }

  .metric-label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .metric-value {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    font-family: var(--mono);
  }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .sc-group { display: flex; gap: 6px; }

  .sc-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: var(--body);
    cursor: pointer;
    transition: all 0.15s;
  }

  .sc-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  .sc-btn.on {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .stake-control {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 220px;
  }

  .stake-label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    font-family: var(--mono);
  }

  .stake-val {
    font-size: 13px;
    font-weight: 500;
    min-width: 60px;
    text-align: right;
    font-family: var(--mono);
    color: var(--blue);
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    background: var(--border2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--text);
    border: 2px solid var(--bg2);
    cursor: pointer;
    transition: transform 0.1s;
  }

  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%; background: var(--text);
    border: 2px solid var(--bg2); cursor: pointer;
  }

  .section-label {
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── Sport cards ── */

  .sport-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 26px 1fr auto;
    gap: 14px;
    align-items: center;
    cursor: pointer;
    transition: opacity 0.15s, border-color 0.15s;
    user-select: none;
  }

  .sport-card:hover { border-color: var(--border2); }
  .sport-card.off { opacity: 0.35; }

  .sport-toggle {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 2px solid var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .sport-card.on .sport-toggle {
    border-color: var(--blue);
    background: var(--blue);
  }

  .sport-toggle svg {
    width: 12px; height: 12px;
    stroke: var(--bg);
    stroke-width: 2.5;
    fill: none;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .sport-card.on .sport-toggle svg { opacity: 1; }

  .sport-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .sport-stats {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 0.02em;
  }

  .sport-pool {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    text-align: right;
    white-space: nowrap;
  }

  .sport-pool-label {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    text-align: right;
    margin-top: 2px;
    letter-spacing: 0.04em;
  }

  .combined-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 13px;
  }

  .combined-label { color: var(--muted); font-size: 12px; }

  .combined-val { font-weight: 500; color: var(--green); font-size: 15px; }

  /* ── Tier rows ── */

  .tier-row {
    display: grid;
    grid-template-columns: 140px 1fr 72px 88px;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .tier-row:last-child { border-bottom: none; }

  .tier-info { display: flex; align-items: center; gap: 9px; }

  .tier-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tier-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .tier-rate {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .tier-users-out {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    text-align: right;
  }

  .tier-rev {
    font-size: 13px;
    font-weight: 500;
    text-align: right;
    font-family: var(--mono);
    color: var(--text);
  }

  /* ── Chart ── */

  .chart-wrap {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    position: relative;
    height: 160px;
  }

  /* ── Audit ── */

  .audit {
    margin-top: 24px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  .audit summary {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--blue);
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .audit summary::before {
    content: '▶';
    font-size: 9px;
    transition: transform 0.15s;
  }

  .audit[open] summary::before { transform: rotate(90deg); }

  .audit-body {
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.8;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    overflow-x: auto;
    white-space: pre-wrap;
  }

  .audit-body .hl { color: var(--text); font-weight: 500; }
  .audit-body .gr { color: var(--green); }
  .audit-body .bl { color: var(--blue); }
  .audit-body .sep { color: var(--dim); }

  @media (max-width: 560px) {
    body { padding: 16px; }
    .card-body { padding: 20px; }
    .card-header { padding: 20px; }
    .metrics { grid-template-columns: 1fr; }
    .sport-card { grid-template-columns: 26px 1fr; }
    .sport-pool, .sport-pool-label { display: none; }
    .tier-row { grid-template-columns: 110px 1fr 56px; }
    .tier-rev { display: none; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="card-title">Rainmaker</div>
    <div class="card-heading">Fee revenue calculator</div>
  </div>

  <div class="card-body">

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Platform monthly rev</div>
        <div class="metric-value" id="m-total">$0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Annual run rate</div>
        <div class="metric-value" id="m-annual">$0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total users</div>
        <div class="metric-value" id="m-users">0</div>
      </div>
    </div>

    <div class="controls">
      <div class="sc-group">
        <button class="sc-btn" onclick="setSc('best',this)">Best case</button>
        <button class="sc-btn on" onclick="setSc('base',this)">Base case</button>
        <button class="sc-btn" onclick="setSc('cons',this)">Conservative</button>
      </div>
      <div class="stake-control">
        <span class="stake-label">Avg stake</span>
        <input type="range" id="stake-sl" min="1" max="50" step="1" value="1" oninput="render()">
        <span class="stake-val" id="stake-out">$100</span>
      </div>
    </div>

    <div class="section-label">Sport models</div>
    <div id="sport-cards"></div>
    <div class="combined-row">
      <span class="combined-label">Combined gross winnings / user / month</span>
      <span class="combined-val" id="combined-pool">$0</span>
    </div>

    <div class="section-label">Users per tier</div>
    <div id="tier-rows"></div>

    <div class="chart-wrap">
      <canvas id="rev-chart"></canvas>
    </div>

    <details class="audit">
      <summary>Show math breakdown</summary>
      <div class="audit-body" id="audit-body"></div>
    </details>

  </div>
</div>

<script>
  const sports = [
    {
      name: 'NBA Burst 2.0',
      tpm: 33.15,
      wp: 56,
      wr: { best: 0.90, base: 0.60, cons: 0.60 },
      color: '#f97316',
      enabled: true
    },
    {
      name: 'NHL Burst',
      tpm: 30.60,
      wp: 114,
      wr: { best: 0.60, base: 0.60, cons: 0.55 },
      color: '#3b82f6',
      enabled: true
    },
    {
      name: 'MLB Burst',
      tpm: 51.00,
      wp: 37,
      wr: { best: 0.70, base: 0.70, cons: 0.55 },
      color: '#22c55e',
      enabled: true
    }
  ];

  const tiers = [
    { name: 'Free / Auger', sub: '25% fee',           rate: 0.25, color: '#6b7a94', def: 0 },
    { name: 'Starter',      sub: '25K RAIN · 22%',    rate: 0.22, color: '#1D9E75', def: 0 },
    { name: 'Core',         sub: '100K RAIN · 18%',   rate: 0.18, color: '#378ADD', def: 94 },
    { name: 'Pro',          sub: '500K RAIN · 15%',   rate: 0.15, color: '#7F77DD', def: 37 },
    { name: 'Elite',        sub: '3M RAIN · 10%',     rate: 0.10, color: '#BA7517', def: 14 },
    { name: 'VIP',          sub: '6M RAIN · 5%',      rate: 0.05, color: '#D85A30', def: 0 }
  ];

  let sc = 'base';
  let chart;

  function getStake() {
    return parseInt(document.getElementById('stake-sl').value) * 100;
  }

  function sportPool(sport, scenario) {
    if (!sport.enabled) return 0;
    return sport.tpm * sport.wr[scenario] * sport.wp;
  }

  function totalPool(scenario) {
    return sports.reduce((sum, sp) => sum + sportPool(sp, scenario), 0);
  }

  function getUsers(i) {
    const el = document.getElementById('u' + i);
    return el ? parseInt(el.value) : tiers[i].def;
  }

  function getTotalUsers() {
    return tiers.reduce((sum, _, i) => sum + getUsers(i), 0);
  }

  function fmt(n) {
    if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return '$' + Math.round(n / 1000).toLocaleString() + 'K';
    return '$' + Math.round(n).toLocaleString();
  }

  function fmtExact(n) {
    return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function pct(n) {
    return (n * 100).toFixed(0) + '%';
  }

  function toggleSport(idx) {
    sports[idx].enabled = !sports[idx].enabled;
    updateSportCards();
    render();
  }

  function setSc(key, btn) {
    sc = key;
    document.querySelectorAll('.sc-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    updateSportCards();
    render();
  }

  function buildSportCards() {
    document.getElementById('sport-cards').innerHTML = sports.map((sp, i) => `
      <div class="sport-card ${sp.enabled ? 'on' : 'off'}" id="sc${i}" onclick="toggleSport(${i})">
        <div class="sport-toggle">
          <svg viewBox="0 0 12 12"><polyline points="2,6 5,9.5 10,2.5"/></svg>
        </div>
        <div>
          <div class="sport-name" style="color:${sp.color}">${sp.name}</div>
          <div class="sport-stats" id="ss${i}">
            ${sp.tpm} trades/mo · WR: ${pct(sp.wr[sc])} · Avg payout: +${sp.wp}%
          </div>
        </div>
        <div>
          <div class="sport-pool" id="sp${i}">$0</div>
          <div class="sport-pool-label">/ user / mo</div>
        </div>
      </div>
    `).join('');
  }

  function updateSportCards() {
    const stake = getStake();
    sports.forEach((sp, i) => {
      const card = document.getElementById('sc' + i);
      const stats = document.getElementById('ss' + i);
      const pool = document.getElementById('sp' + i);
      if (!card) return;

      card.className = 'sport-card ' + (sp.enabled ? 'on' : 'off');
      stats.textContent = `${sp.tpm} trades/mo · WR: ${pct(sp.wr[sc])} · Avg payout: +${sp.wp}%`;

      const val = sportPool(sp, sc) * (stake / 100);
      pool.textContent = sp.enabled ? fmt(val) : '$0';
    });
  }

  function buildTierRows() {
    document.getElementById('tier-rows').innerHTML = tiers.map((t, i) => `
      <div class="tier-row">
        <div class="tier-info">
          <div class="tier-dot" style="background:${t.color}"></div>
          <div>
            <div class="tier-name">${t.name}</div>
            <div class="tier-rate">${t.sub}</div>
          </div>
        </div>
        <input type="range" id="u${i}" min="0" max="1000" step="1" value="${t.def}"
          oninput="render()" style="accent-color:${t.color}">
        <div class="tier-users-out" id="uout${i}">${t.def}</div>
        <div class="tier-rev" id="rev${i}">$0</div>
      </div>
    `).join('');
  }

  function buildAudit() {
    const stake = getStake();
    const stakeScale = stake / 100;
    const scLabel = sc === 'best' ? 'Best case' : sc === 'cons' ? 'Conservative' : 'Base case';
    let lines = [];

    lines.push(`<span class="bl">Scenario: ${scLabel}  ·  Stake: $${stake.toLocaleString()}</span>`);
    lines.push('');
    lines.push('<span class="hl">Step 1 — Per-sport gross winnings per user per month</span>');
    lines.push('<span class="sep">Formula: trades/mo × win_rate × avg_payout × (stake ÷ $100)</span>');
    lines.push('');

    let poolTotal = 0;
    sports.forEach(sp => {
      const wr = sp.wr[sc];
      const raw = sp.tpm * wr * sp.wp;
      const scaled = raw * stakeScale;
      const tag = sp.enabled ? '✓' : '✗';
      const cls = sp.enabled ? 'hl' : '';
      poolTotal += sp.enabled ? scaled : 0;

      lines.push(
        `  ${tag} <span class="${cls}">${sp.name.padEnd(16)}</span>` +
        `${sp.tpm.toFixed(2)} × ${pct(wr).padStart(3)} × $${sp.wp} × ${stakeScale.toFixed(1)}` +
        `  = <span class="${sp.enabled ? 'gr' : ''}">${sp.enabled ? fmtExact(scaled) : '$0.00 (off)'}</span>`
      );
    });

    lines.push(`<span class="sep">  ${'─'.repeat(56)}</span>`);
    lines.push(`  Combined pool per user: <span class="gr">${fmtExact(poolTotal)}</span> / month`);
    lines.push('');
    lines.push('<span class="hl">Step 2 — Platform fee revenue per tier</span>');
    lines.push('<span class="sep">Formula: pool_per_user × fee_rate × num_users</span>');
    lines.push('');

    let revTotal = 0;
    tiers.forEach((t, i) => {
      const u = getUsers(i);
      if (u === 0) return;
      const rev = poolTotal * t.rate * u;
      revTotal += rev;
      lines.push(
        `  ${t.name.padEnd(14)} ${(t.rate * 100).toFixed(0).padStart(2)}% fee × ${String(u).padStart(4)} users` +
        `  → ${fmtExact(poolTotal)} × ${t.rate} × ${u} = <span class="hl">${fmtExact(rev)}</span>`
      );
    });

    lines.push(`<span class="sep">  ${'─'.repeat(56)}</span>`);
    lines.push(`  Total platform revenue: <span class="gr">${fmtExact(revTotal)}</span> / month`);
    lines.push(`  Annual run rate:        <span class="gr">${fmtExact(revTotal * 12)}</span>`);

    document.getElementById('audit-body').innerHTML = lines.join('\n');
  }

  function render() {
    const stake = getStake();
    const stakeScale = stake / 100;
    document.getElementById('stake-out').textContent = '$' + stake.toLocaleString();

    const pool = totalPool(sc);
    const poolDollars = pool * stakeScale;
    document.getElementById('combined-pool').textContent = fmt(poolDollars);

    updateSportCards();

    let total = 0;
    const revs = tiers.map((t, i) => {
      const u = getUsers(i);
      const rev = poolDollars * t.rate * u;
      total += rev;
      const rel = document.getElementById('rev' + i);
      const uout = document.getElementById('uout' + i);
      if (rel) rel.textContent = fmt(rev);
      if (uout) uout.textContent = u;
      return Math.round(rev);
    });

    document.getElementById('m-total').textContent = fmt(total);
    document.getElementById('m-annual').textContent = fmt(total * 12);
    document.getElementById('m-users').textContent = getTotalUsers().toLocaleString();

    if (chart) {
      chart.data.datasets[0].data = revs;
      chart.update('none');
    }

    buildAudit();
  }

  buildSportCards();
  buildTierRows();

  chart = new Chart(document.getElementById('rev-chart'), {
    type: 'bar',
    data: {
      labels: tiers.map(t => t.name),
      datasets: [{
        data: tiers.map(() => 0),
        backgroundColor: tiers.map(t => t.color),
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0d1420',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleColor: '#e8edf5',
          bodyColor: '#6b7a94',
          callbacks: { label: ctx => '  $' + ctx.raw.toLocaleString() + ' / mo' }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          border: { display: false },
          ticks: { color: '#6b7a94', font: { size: 11, family: "'JetBrains Mono'" } }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
          border: { display: false },
          ticks: {
            color: '#6b7a94',
            font: { size: 11, family: "'JetBrains Mono'" },
            callback: v => v >= 1000 ? '$' + Math.round(v / 1000) + 'K' : '$' + v
          }
        }
      }
    }
  });

  render();
</script>

</body>
</html>
